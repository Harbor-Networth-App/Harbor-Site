<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer ring - white -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#f5f8fc" stroke-width="8"/>
  <!-- Gold accent ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#c9a84c" stroke-width="4"/>
  <!-- Inner ring - white -->
  <circle cx="250" cy="250" r="110" fill="none" stroke="#f5f8fc" stroke-width="6"/>

  <!-- Lighthouse -->
  <path d="M230 315 L270 315 L265 260 L235 260 Z" fill="#f5f8fc"/>
  <rect x="238" y="240" width="24" height="20" fill="#f5f8fc"/>
  <polygon points="235,240 265,240 250,215" fill="#f5f8fc"/>
  <rect x="245" y="245" width="10" height="8" fill="#c9a84c"/>
  <rect x="235" y="278" width="30" height="8" fill="#c9a84c"/>
  <rect x="245" y="297" width="10" height="16" rx="4" fill="#0a0f1e"/>

  <!-- Text paths -->
  <defs>
    <path id="topArc" d="M 95,250 A 155,155 0 0,1 405,250"/>
    <path id="bottomArc" d="M 108,250 A 142,142 0 0,0 392,250"/>
  </defs>

  <!-- HARBOR along top -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="bold" fill="#f5f8fc" letter-spacing="8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">HARBOR</textPath>
  </text>

  <!-- NET WORTH along bottom -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="#c9a84c" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle" dominant-baseline="hanging">NET WORTH</textPath>
  </text>

</svg>
