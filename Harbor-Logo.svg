<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#f5f8fc" stroke-width="8"/>
  <!-- Gold accent ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#c9a84c" stroke-width="4"/>
  <!-- Inner ring -->
  <circle cx="250" cy="250" r="110" fill="none" stroke="#f5f8fc" stroke-width="6"/>

  <!-- Lighthouse body -->
  <g>
    <path d="M230 315 L270 315 L265 260 L235 260 Z" fill="#f5f8fc"/>
    <rect x="238" y="240" width="24" height="15" fill="#f5f8fc"/>
    <path d="M235 235 L265 235 L250 215 Z" fill="#f5f8fc"/>
    <!-- Light window accent -->
    <rect x="245" y="243" width="10" height="8" fill="#c9a84c"/>
    <!-- Light beam -->
    <path d="M235 285 L265 270 L266 280 L236 295 Z" fill="#c9a84c" opacity="0.8"/>
    <!-- Door -->
    <rect x="245" y="295" width="10" height="15" rx="5" fill="#0a0f1e"/>
  </g>

  <!-- Curved text paths -->
  <defs>
    <path id="harborPath" d="M 100,250 A 150,150 0 0,1 400,250"/>
    <path id="netWorthPath" d="M 100,250 A 150,150 0 0,0 400,250"/>
  </defs>

  <!-- HARBOR text -->
  <text fill="#f5f8fc" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" letter-spacing="10">
    <textPath xlink:href="#harborPath" startOffset="50%" text-anchor="middle">HARBOR</textPath>
  </text>

  <!-- NET WORTH text -->
  <text fill="#c9a84c" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold" letter-spacing="5">
    <textPath xlink:href="#netWorthPath" startOffset="50%" text-anchor="middle" dominant-baseline="hanging">NET WORTH</textPath>
  </text>
</svg>
